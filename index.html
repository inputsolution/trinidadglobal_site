<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO primario ── -->
    <title>Trinidad Global LLC — International Business Platform</title>
    <meta
      name="description"
      content="Trinidad Global LLC is a U.S.-based international business platform built upon the commercial experience and five decades of operations of Distribuidora de Gomas Trinidad in the Caribbean. International sourcing, strategic partnerships, and long-term Caribbean trade."
    />
    <meta
      name="keywords"
      content="Trinidad Global, international sourcing, Caribbean trade, strategic partnerships, Distribuidora de Gomas Trinidad, Dominican Republic, automotive distribution, supplier relationships, Wyoming LLC"
    />
    <meta name="author" content="Trinidad Global LLC" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="googlebot" content="index, follow" />
    <meta name="theme-color" content="#0d0f12" />
    <meta name="geo.region" content="US-WY" />
    <meta name="geo.placename" content="Wyoming, United States" />
    <link rel="canonical" href="https://www.trinidadglobal.com/" />

    <!-- ── Open Graph (Facebook / LinkedIn / WhatsApp) ── -->
    <meta property="og:site_name" content="Trinidad Global LLC" />
    <meta property="og:title" content="Trinidad Global LLC — International Business Platform" />
    <meta
      property="og:description"
      content="A U.S.-based platform for international sourcing and strategic partnerships, built upon the commercial experience of Distribuidora de Gomas Trinidad — five decades of Caribbean trade."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.trinidadglobal.com/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://www.trinidadglobal.com/favicon.svg" />

    <!-- ── Twitter / X ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Trinidad Global LLC — International Business Platform" />
    <meta
      name="twitter:description"
      content="A U.S.-based platform for international sourcing and strategic partnerships, built upon five decades of Caribbean trade."
    />
    <meta name="twitter:image" content="https://www.trinidadglobal.com/favicon.svg" />

    <!-- ── Datos estructurados (Google entiende que es una organización) ── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Trinidad Global LLC",
        "legalName": "Trinidad Global LLC",
        "url": "https://www.trinidadglobal.com/",
        "logo": "https://www.trinidadglobal.com/favicon.svg",
        "description": "A U.S.-based international business and sourcing platform built upon the commercial experience of Distribuidora de Gomas Trinidad, with more than five decades of uninterrupted business in the Caribbean.",
        "foundingDate": "2026",
        "address": {
          "@type": "PostalAddress",
          "addressRegion": "Wyoming",
          "addressCountry": "US"
        },
        "areaServed": ["US", "DO", "Caribbean"],
        "email": "info@trinidadglobal.com",
        "sameAs": []
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&family=Jost:ital,wght@1,300&display=swap"
      rel="stylesheet"
    />
